<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product | ristylighty</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- BASE -->
  <link rel="stylesheet" href="css/base/reset.css">
  <link rel="stylesheet" href="css/base/typography.css">

  <!-- LAYOUT -->
  <link rel="stylesheet" href="css/layout/navbar.css">
  <link rel="stylesheet" href="css/layout/grid.css">

  <!-- COMPONENTS -->
  <link rel="stylesheet" href="css/components/buttons.css">
  <link rel="stylesheet" href="css/components/cards.css">

  <!-- PAGE -->
  <link rel="stylesheet" href="css/pages/shop.css">

  <!-- UTILS -->
  <link rel="stylesheet" href="css/utils/animations.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="logo">
    <img src="images/logo.png" style="height:30px; vertical-align:middle;">
    ristylighty
  </div>

  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="shop.html">Shop</a>
  </div>

  <div class="nav-icons">
    <a href="cart.html">🛒</a>
  </div>
</nav>

<!-- PRODUCT PAGE -->
<section class="container section">

  <div class="grid grid-2">

    <!-- LEFT: IMAGE -->
    <div class="product-images card">
      <img id="mainImage" style="width:100%; border-radius:10px;">

      <div class="thumbs" id="thumbContainer" style="display:flex; gap:10px; margin-top:10px;"></div>
    </div>

    <!-- RIGHT: DETAILS -->
    <div class="product-details">

      <h1 id="productName"></h1>

      <p style="font-size:20px; margin:10px 0;" id="productPrice"></p>

      <p class="desc">
        Premium oversized anime tee. Breathable fabric with long-lasting print.
      </p>

      <!-- SIZE -->
      <div class="sizes" style="display:flex; gap:10px; margin:15px 0;">
        <button class="btn btn-outline">S</button>
        <button class="btn btn-outline">M</button>
        <button class="btn btn-outline">L</button>
        <button class="btn btn-outline">XL</button>
      </div>

      <!-- ACTION -->
      <button onclick="addToCart()" class="btn btn-primary">
        Add to Cart
      </button>

    </div>

  </div>

</section>

<!-- RELATED / SUGGESTIONS -->
<section class="container section">
  <div class="section-title">
    <h2>You May Also Like</h2>
  </div>

  <div class="grid grid-auto" id="relatedProducts"></div>
</section>

<!-- SCRIPT -->
<script src="js/product.js"></script>

</body>
</html>
